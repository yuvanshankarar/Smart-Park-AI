version: '3.8'
services:
  mongo:
    image: mongo:6.0
    container_name: smartpark-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./server
    container_name: smartpark-backend
    restart: unless-stopped
    env_file:
      - ./server/.env.example
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  frontend:
    build:
      context: ./client
    container_name: smartpark-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      - backend

  ai-service:
    build:
      context: ./ai-service
    container_name: smartpark-ai-service
    restart: unless-stopped
    env_file:
      - ./ai-service/.env.example
    ports:
      - '8000:8000'

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: smartpark-mqtt
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9001:9001'

volumes:
  mongo-data:
